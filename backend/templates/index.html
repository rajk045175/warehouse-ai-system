<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <title>AI Warehouse Incident Reporter</title>

      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

      <style>
            body {
                  background: #0f1720;
                  font-family: Arial;
                  text-align: center;
                  color: white;
            }

            .container {
                  margin-top: 60px;
            }

            button {
                  padding: 15px 30px;
                  font-size: 18px;
                  background: #ff4d4d;
                  color: white;
                  border: none;
                  border-radius: 6px;
                  cursor: pointer;
            }

            button:hover {
                  background: #ff2b2b;
            }

            #result {
                  margin-top: 20px;
                  background: #22c55e;
                  color: white;
                  padding: 15px;
                  border-radius: 10px;
                  font-size: 20px;
                  width: 300px;
                  margin-left: auto;
                  margin-right: auto;
            }

            .chartBox {
                  width: 260px;
                  height: 180px;
                  margin: 20px auto;
                  background: white;
                  border-radius: 10px;
                  padding: 10px;
            }

            .chartBox canvas {
                  width: 100% !important;
                  height: 100% !important;
            }
      </style>

</head>

<body>

      <div class="container">

            <h1>🎤 AI Warehouse Incident Reporter</h1>

            <h3>Press and Speak</h3>

            <label>Select Language:</label>

            <select id="langSelect">
                  <option value="en-IN">English</option>
                  <option value="ta-IN">Tamil</option>
                  <option value="hi-IN">Hindi</option>
                  <option value="te-IN">Telugu</option>
                  <option value="ml-IN">Malayalam</option>
                  <option value="kn-IN">Kannada</option>
            </select>

            <br><br>

            <button id="recordBtn">Start Recording</button>

            <div id="result">
                  Waiting for voice input...
            </div>

            <div class="chartBox">
                  <canvas id="incidentChart"></canvas>
            </div>

      </div>


      <script>

            const btn = document.getElementById("recordBtn");
            const resultBox = document.getElementById("result");

            let recognition;
            let isListening = false;

            btn.onclick = () => {

                  const SpeechRecognition =
                        window.SpeechRecognition || window.webkitSpeechRecognition;

                  if (!SpeechRecognition) {
                        alert("Speech Recognition not supported. Use Google Chrome.");
                        return;
                  }

                  recognition = new SpeechRecognition();

                  recognition.lang = document.getElementById("langSelect").value;
                  recognition.continuous = false;
                  recognition.interimResults = false;

                  btn.innerText = "Listening...";
                  isListening = true;

                  recognition.start();

                  recognition.onresult = function (event) {

                        let text = event.results[0][0].transcript;

                        console.log("You said:", text);

                        sendToServer(text);

                  };

                  recognition.onend = function () {

                        btn.innerText = "Start Recording";
                        isListening = false;

                  };

                  recognition.onerror = function (e) {

                        console.log("Mic error:", e);
                        btn.innerText = "Start Recording";

                  };

            };


            function sendToServer(text) {

                  fetch("/predict", {

                        method: "POST",

                        headers: {
                              "Content-Type": "application/json"
                        },

                        body: JSON.stringify({ text: text })

                  })

                        .then(res => res.json())

                        .then(data => {

                              resultBox.innerHTML =
                                    "Priority: " + data.severity +
                                    "<br>Action: " + data.action;

                              loadIncidentStats();

                        });

            }



            function loadIncidentStats() {

                  fetch("/incidents")

                        .then(res => res.json())

                        .then(data => {

                              let high = 0;
                              let medium = 0;
                              let low = 0;

                              data.forEach(i => {

                                    if (i.severity === "HIGH") high++;
                                    else if (i.severity === "MEDIUM") medium++;
                                    else low++;

                              });

                              const ctx = document.getElementById("incidentChart");

                              new Chart(ctx, {

                                    type: "pie",

                                    data: {

                                          labels: ["High", "Medium", "Low"],

                                          datasets: [{

                                                data: [high, medium, low],

                                                backgroundColor: ["#ef4444", "#f59e0b", "#22c55e"]

                                          }]

                                    }

                              });

                        });

            }

            loadIncidentStats();

      </script>

</body>

</html>
